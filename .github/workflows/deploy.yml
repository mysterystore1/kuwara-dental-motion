name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx astro build
      - name: Rewrite internal links for base path
        run: |
          BASE="/kuwara-dental"
          find dist -name "*.html" -exec sed -i "s|href=\"/|href=\"${BASE}/|g" {} \;
          find dist -name "*.html" -exec sed -i "s|href=\"${BASE}${BASE}/|href=\"${BASE}/|g" {} \;
          find dist -name "*.html" -exec sed -i "s|href=\"${BASE}/http|href=\"http|g" {} \;
          find dist -name "*.html" -exec sed -i "s|href=\"${BASE}/tel:|href=\"tel:|g" {} \;
          find dist -name "*.html" -exec sed -i "s|href=\"${BASE}/#|href=\"#|g" {} \;
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
